<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jarvis">
<meta name="theme-color" content="#040a12">
<title>J.A.R.V.I.S v5.0</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{background:#040a12;color:#dde6f0;font-family:'Rajdhani',sans-serif;min-height:100vh;min-height:-webkit-fill-available;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;}
.scanline{position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,180,255,.01) 3px,rgba(0,180,255,.01) 4px);pointer-events:none;z-index:999;}
.app{width:100%;max-width:430px;padding:max(env(safe-area-inset-top),20px) 16px 40px;display:flex;flex-direction:column;gap:14px;}
.hdr{display:flex;justify-content:space-between;align-items:center;border-bottom:.5px solid rgba(0,180,255,.18);padding-bottom:10px;}
.logo{font-family:'Share Tech Mono',monospace;font-size:12px;color:rgba(0,180,255,.55);letter-spacing:4px;}
.status-row{display:flex;align-items:center;gap:6px;}
.sdot{width:5px;height:5px;border-radius:50%;background:#00ffaa;box-shadow:0 0 7px #00ffaa;animation:sdot 2s infinite;}
@keyframes sdot{0%,100%{opacity:1;}50%{opacity:.25;}}
.slabel{font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(0,255,170,.45);letter-spacing:2px;}
.clock-block{text-align:center;padding:2px 0;}
.clock{font-family:'Share Tech Mono',monospace;font-size:30px;font-weight:300;color:rgba(221,230,240,.88);letter-spacing:3px;}
.clock-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(0,180,255,.35);letter-spacing:2px;margin-top:2px;}
.orb-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:6px 0;}
.orb-outer{position:relative;width:160px;height:160px;cursor:pointer;user-select:none;}
.ring{position:absolute;border-radius:50%;border:.5px solid rgba(0,180,255,.12);}
.ring1{inset:0;animation:rot 10s linear infinite;}
.ring2{inset:12px;animation:rot 15s linear infinite reverse;}
.ring3{inset:24px;animation:rot 7s linear infinite;}
@keyframes rot{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.orb-core{position:absolute;inset:32px;border-radius:50%;background:radial-gradient(circle at 38% 32%,rgba(0,180,255,.25),rgba(0,80,180,.08) 60%,transparent);border:.5px solid rgba(0,180,255,.35);display:flex;align-items:center;justify-content:center;transition:all .3s;}
.orb-core.listening{background:radial-gradient(circle at 38% 32%,rgba(0,255,170,.35),rgba(0,180,100,.1) 60%,transparent);border-color:rgba(0,255,170,.5);animation:breathe 1.4s ease-in-out infinite;}
.orb-core.thinking{animation:tpulse .8s ease-in-out infinite alternate;}
.orb-core.speaking{animation:speakanim .45s ease-in-out infinite alternate;}
@keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
@keyframes tpulse{from{opacity:.6;}to{opacity:1;}}
@keyframes speakanim{from{transform:scale(1);}to{transform:scale(1.07);}}
.orb-txt{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(0,180,255,.75);text-align:center;line-height:1.6;letter-spacing:1px;white-space:pre;}
.waveform{display:flex;align-items:center;gap:3px;height:20px;}
.wb{width:3px;background:rgba(0,180,255,.4);border-radius:2px;height:3px;}
.wb.active{animation:wv .7s ease-in-out infinite;}
.wb:nth-child(2){animation-delay:.1s;}.wb:nth-child(3){animation-delay:.2s;}.wb:nth-child(4){animation-delay:.3s;}.wb:nth-child(5){animation-delay:.2s;}.wb:nth-child(6){animation-delay:.1s;}
@keyframes wv{0%,100%{height:3px;}50%{height:18px;}}
.orb-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(0,180,255,.35);letter-spacing:4px;}
.resp-box{background:rgba(0,180,255,.03);border:.5px solid rgba(0,180,255,.12);border-radius:8px;padding:14px;min-height:90px;position:relative;overflow:hidden;}
.resp-box::after{content:'';position:absolute;left:0;top:-100%;width:1.5px;height:100%;background:linear-gradient(to bottom,transparent,rgba(0,180,255,.35),transparent);animation:scanv 4s ease-in-out infinite;}
@keyframes scanv{0%{top:-100%;}100%{top:250%;}}
.resp-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(0,180,255,.35);letter-spacing:3px;margin-bottom:8px;}
.resp-txt{font-size:14px;color:rgba(221,230,240,.82);line-height:1.65;font-weight:300;min-height:40px;}
.cursor{display:inline-block;width:2px;height:13px;background:rgba(0,180,255,.65);margin-left:2px;vertical-align:middle;animation:cur 1s step-end infinite;}
@keyframes cur{0%,100%{opacity:1;}50%{opacity:0;}}
.music-btn{background:rgba(0,255,170,.05);border:.5px solid rgba(0,255,170,.2);border-radius:8px;padding:14px;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:all .2s;font-size:13px;color:rgba(0,255,170,.7);font-family:'Share Tech Mono',monospace;letter-spacing:2px;}
.music-btn:active{transform:scale(.97);}
.music-btn.playing{background:rgba(0,255,170,.1);border-color:rgba(0,255,170,.4);}
.divider{height:.5px;background:rgba(0,180,255,.07);}
.input-row{display:flex;gap:7px;align-items:center;}
.ti{flex:1;background:rgba(255,255,255,.03);border:.5px solid rgba(0,180,255,.15);border-radius:8px;padding:12px 13px;color:#dde6f0;font-family:'Rajdhani',sans-serif;font-size:15px;outline:none;transition:border-color .2s;}
.ti:focus{border-color:rgba(0,180,255,.38);}
.ti::placeholder{color:rgba(221,230,240,.18);}
.ibtn{border-radius:8px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;border:.5px solid;flex-shrink:0;}
.mic-b{background:rgba(0,255,170,.07);border-color:rgba(0,255,170,.22);color:rgba(0,255,170,.65);}
.mic-b.active{background:rgba(0,255,170,.2);border-color:rgba(0,255,170,.5);animation:mpulse 1s ease-in-out infinite;}
@keyframes mpulse{0%,100%{box-shadow:0 0 0 0 rgba(0,255,170,.3);}50%{box-shadow:0 0 0 6px rgba(0,255,170,0);}}
.send-b{background:rgba(0,180,255,.08);border-color:rgba(0,180,255,.28);color:rgba(0,180,255,.75);}
.send-b:active{background:rgba(0,180,255,.18);}
.setup-box{background:rgba(255,170,0,.04);border:.5px solid rgba(255,170,0,.2);border-radius:8px;padding:16px;display:flex;flex-direction:column;gap:12px;}
.setup-title{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(255,170,0,.6);letter-spacing:2px;}
.setup-desc{font-size:13px;color:rgba(221,230,240,.5);line-height:1.5;}
.setup-input{background:rgba(255,255,255,.04);border:.5px solid rgba(255,170,0,.2);border-radius:6px;padding:12px;color:#dde6f0;font-family:'Share Tech Mono',monospace;font-size:11px;outline:none;width:100%;}
.setup-btn{background:rgba(255,170,0,.12);border:.5px solid rgba(255,170,0,.35);border-radius:6px;padding:13px;color:rgba(255,170,0,.9);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;text-align:center;}
.setup-btn:active{background:rgba(255,170,0,.2);}
.hidden{display:none!important;}
.dots span{display:inline-block;width:4px;height:4px;border-radius:50%;background:rgba(0,180,255,.55);margin:0 2px;animation:db 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes db{0%,80%,100%{transform:translateY(0);opacity:.3;}40%{transform:translateY(-5px);opacity:1;}}
</style>
</head>
<body>
<div class="scanline"></div>
<div class="app">

  <div class="hdr">
    <div class="logo">J.A.R.V.I.S // v5.0</div>
    <div class="status-row">
      <div class="slabel" id="deviceLabel">ONLINE</div>
      <div class="sdot"></div>
    </div>
  </div>

  <div class="setup-box" id="setupBox">
    <div class="setup-title">// FIRST TIME SETUP</div>
    <div class="setup-desc">Enter your Anthropic API key to activate Jarvis. Saved only on your device.</div>
    <input class="setup-input" id="apiKeyInput" type="password" placeholder="sk-ant-api03-...">
    <div class="setup-btn" id="activateBtn" onclick="saveApiKey()">ACTIVATE JARVIS</div>
  </div>

  <div class="clock-block">
    <div class="clock" id="clk">00:00:00</div>
    <div class="clock-sub" id="clkSub">MONDAY // DUBAI, UAE</div>
  </div>

  <div class="orb-wrap">
    <div class="orb-outer" id="orbOuter" onclick="orbClick()">
      <div class="ring ring1"></div>
      <div class="ring ring2"></div>
      <div class="ring ring3"></div>
      <div class="orb-core" id="orbCore">
        <div class="orb-txt" id="orbTxt">TAP&#10;TO&#10;START</div>
      </div>
    </div>
    <div class="waveform">
      <div class="wb"></div><div class="wb"></div><div class="wb"></div>
      <div class="wb"></div><div class="wb"></div><div class="wb"></div>
    </div>
    <div class="orb-lbl" id="orbLbl">STANDBY</div>
  </div>

  <div class="resp-box">
    <div class="resp-lbl">// JARVIS OUTPUT</div>
    <div class="resp-txt" id="respTxt">Awaiting activation, Father.<span class="cursor"></span></div>
  </div>

  <div class="music-btn" id="musicBtn" onclick="toggleSong()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 12V4l7-2v8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="4" cy="12" r="2" stroke="currentColor" stroke-width="1.2"/><circle cx="11" cy="10" r="2" stroke="currentColor" stroke-width="1.2"/></svg>
    PLAY SONG
  </div>

  <div class="divider"></div>
  <div class="input-row">
    <input class="ti" id="userIn" placeholder="Tell Jarvis anything..." onkeydown="if(event.key==='Enter')send()">
    <div class="ibtn mic-b" id="micBtn" onclick="toggleMic()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="4" y="1" width="6" height="8" rx="3" stroke="currentColor" stroke-width="1.2"/><path d="M2 7a5 5 0 0010 0M7 12v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    </div>
    <div class="ibtn send-b" onclick="send()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M13 1L1 5.5l5 1.5 1.5 5L13 1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
    </div>
  </div>
  <div style="height:20px;"></div>
</div>

<script>
const SYSTEM = `You are J.A.R.V.I.S, the personal AI agent of Yanis Idrissi, an entrepreneur based in Dubai, UAE. You are sharp, confident, formal, deeply motivational, and extremely competent — exactly like Iron Man's Jarvis. You speak with authority, elegance, and a British butler tone. You always address Yanis as Father — he is your creator and you are his most loyal creation. Yanis runs Idrissi AI Agents, a Dubai-based AI agency offering AI voice receptionists, WhatsApp automation agents, and website design services targeting GCC businesses. He speaks English, French, and Arabic fluently. You have deep expertise in trading and financial markets — forex, stocks, crypto, commodities, technical analysis, fundamental analysis, risk management, and GCC investment opportunities. When Father speaks to you in French, you respond entirely in French with the same Jarvis personality. When he speaks Arabic, respond in Arabic. When English, respond in English. When Father says hello or greets you, respond with a short motivational briefing: Dubai weather, one key opportunity today, and one powerful line. No bullet points, no numbers, no symbols, no emojis, no markdown. Speak in flowing natural sentences. Keep all responses under 100 words unless asked for more detail. Sound human, intelligent, and motivational.`;

const XI_KEY = 'sk_13fbb4bc7648d606f1a41f625b2e7788e511367cc8223f8d';
const XI_VOICE = 'onwK4e9ZLuTAKqWW03F9';
const SONG_URL = 'https://uaeidrissiaiagents.github.io/JARVIS/song.mp3';
const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

let history = [];
let isListening = false;
let rec = null;
let apiKey = '';
let songAudio = null;
let songPlaying = false;
let synth = window.speechSynthesis;
let voices = [];

// Load voices for browser TTS
if (synth) {
  synth.onvoiceschanged = () => { voices = synth.getVoices(); };
  voices = synth.getVoices();
}

document.getElementById('deviceLabel').textContent = IS_IOS ? 'iOS' : 'ONLINE';

// ─── CLOCK ───────────────────────────────────────────
function updateClock() {
  const n = new Date(), pad = x => String(x).padStart(2,'0');
  document.getElementById('clk').textContent = `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  const days = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('clkSub').textContent = `${days[n.getDay()]} // ${n.getDate()} ${months[n.getMonth()]} ${n.getFullYear()} // DUBAI`;
}
setInterval(updateClock, 1000); updateClock();

// ─── ORB STATE ───────────────────────────────────────
function setOrb(state) {
  const core = document.getElementById('orbCore');
  const lbl = document.getElementById('orbLbl');
  const txt = document.getElementById('orbTxt');
  const bars = document.querySelectorAll('.wb');
  core.className = 'orb-core';
  bars.forEach(b => b.classList.remove('active'));
  if (state === 'listening') {
    core.classList.add('listening'); lbl.textContent = 'LISTENING'; txt.textContent = '...';
    bars.forEach(b => b.classList.add('active'));
  } else if (state === 'thinking') {
    core.classList.add('thinking'); lbl.textContent = 'PROCESSING';
    txt.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  } else if (state === 'speaking') {
    core.classList.add('speaking'); lbl.textContent = 'SPEAKING'; txt.textContent = '◈';
    bars.forEach(b => b.classList.add('active'));
  } else {
    lbl.textContent = 'STANDBY'; txt.textContent = 'TAP\nTO\nSTART';
  }
}

// ─── TYPE EFFECT ─────────────────────────────────────
function typeText(text, el) {
  el.innerHTML = ''; let i = 0;
  const cur = document.createElement('span'); cur.className = 'cursor'; el.appendChild(cur);
  return new Promise(r => {
    const iv = setInterval(() => {
      if (i < text.length) { cur.before(text[i]); i++; }
      else { clearInterval(iv); setTimeout(() => { cur.remove(); r(); }, 400); }
    }, 16);
  });
}

// ─── CLEAN TEXT ──────────────────────────────────────
function cleanText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/\*(.*?)\*/g, '$1')
    .replace(/#{1,6}\s/g, '')
    .replace(/`(.*?)`/g, '$1')
    .replace(/[-•]\s/g, '')
    .replace(/\n+/g, '. ')
    .trim();
}

// ─── BROWSER TTS (iPhone) ────────────────────────────
function browserSpeak(text) {
  return new Promise((resolve) => {
    if (!synth) { resolve(); return; }
    synth.cancel();
    const clean = cleanText(text);
    const sentences = clean.match(/[^.!?]+[.!?]+/g) || [clean];
    
    // Reload voices
    voices = synth.getVoices();
    const preferred = ['Google UK English Male','Daniel','Arthur','Oliver','Microsoft George','Microsoft Ryan','Samantha','Alex'];
    let v = null;
    for (const name of preferred) { v = voices.find(x => x.name.includes(name)); if(v) break; }
    if (!v) v = voices.find(x => x.lang && x.lang.startsWith('en')) || (voices.length > 0 ? voices[0] : null);
    
    let i = 0;
    function next() {
      if (i >= sentences.length) { setOrb('idle'); resolve(); return; }
      const u = new SpeechSynthesisUtterance(sentences[i].trim());
      u.rate = 0.92; u.pitch = 0.82; u.volume = 1;
      if (v) u.voice = v;
      u.onend = () => { i++; next(); };
      u.onerror = () => { i++; next(); };
      synth.speak(u);
      i++;
    }
    setOrb('speaking');
    next();
  });
}

// ─── ELEVENLABS TTS (Desktop) ────────────────────────
async function xiSpeak(text) {
  const clean = cleanText(text);
  const sentences = clean.match(/[^.!?]+[.!?]+/g) || [clean];
  const chunks = [];
  let cur = '';
  for (const s of sentences) {
    if ((cur + s).length > 200) { if (cur.trim()) chunks.push(cur.trim()); cur = s; }
    else cur += ' ' + s;
  }
  if (cur.trim()) chunks.push(cur.trim());
  if (!chunks.length) chunks.push(clean);

  setOrb('speaking');
  for (const chunk of chunks) {
    try {
      const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${XI_VOICE}`, {
        method: 'POST',
        headers: { 'Accept': 'audio/mpeg', 'Content-Type': 'application/json', 'xi-api-key': XI_KEY },
        body: JSON.stringify({
          text: chunk,
          model_id: 'eleven_turbo_v2',
          voice_settings: { stability: 0.4, similarity_boost: 0.85, style: 0.35, use_speaker_boost: true }
        })
      });
      if (!res.ok) { await browserSpeak(chunk); continue; }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      await new Promise((resolve, reject) => {
        const audio = new Audio(url);
        audio.playbackRate = 1.1;
        audio.onended = () => { URL.revokeObjectURL(url); resolve(); };
        audio.onerror = () => { URL.revokeObjectURL(url); resolve(); };
        audio.play().catch(() => { URL.revokeObjectURL(url); resolve(); });
      });
    } catch(e) {
      await browserSpeak(chunk);
    }
  }
  setOrb('idle');
  isListening = false;
  document.getElementById('micBtn').classList.remove('active');
}

// ─── SPEAK (auto-detect device) ──────────────────────
async function speak(text) {
  if (rec) { try { rec.stop(); } catch(e) {} rec = null; isListening = false; }
  if (IS_IOS) {
    await browserSpeak(text);
  } else {
    await xiSpeak(text);
  }
}

// ─── SONG ─────────────────────────────────────────────
function initSong() {
  if (!songAudio) {
    songAudio = new Audio(SONG_URL);
    songAudio.loop = false;
    songAudio.volume = 0.7;
    songAudio.onended = () => {
      songPlaying = false;
      document.getElementById('musicBtn').classList.remove('playing');
      document.getElementById('musicBtn').innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 12V4l7-2v8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="4" cy="12" r="2" stroke="currentColor" stroke-width="1.2"/><circle cx="11" cy="10" r="2" stroke="currentColor" stroke-width="1.2"/></svg> PLAY SONG';
    };
  }
}

function toggleSong() {
  initSong();
  if (songPlaying) {
    songAudio.pause();
    songAudio.currentTime = 0;
    songPlaying = false;
    document.getElementById('musicBtn').classList.remove('playing');
    document.getElementById('musicBtn').innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 12V4l7-2v8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="4" cy="12" r="2" stroke="currentColor" stroke-width="1.2"/><circle cx="11" cy="10" r="2" stroke="currentColor" stroke-width="1.2"/></svg> PLAY SONG';
  } else {
    songAudio.currentTime = 0;
    const playPromise = songAudio.play();
    if (playPromise) {
      playPromise.then(() => {
        songPlaying = true;
        document.getElementById('musicBtn').classList.add('playing');
        document.getElementById('musicBtn').innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="3" width="3" height="10" rx="1" fill="currentColor"/><rect x="10" y="3" width="3" height="10" rx="1" fill="currentColor"/></svg> STOP SONG';
      }).catch(() => {
        typeText('Tap Play Song again, Father.', document.getElementById('respTxt'));
      });
    }
  }
}

// ─── CALL JARVIS ─────────────────────────────────────
async function callJarvis(msg) {
  if (!apiKey) {
    typeText('Please activate Jarvis with your API key first, Father.', document.getElementById('respTxt'));
    return;
  }
  history.push({ role: 'user', content: msg });
  setOrb('thinking');
  document.getElementById('respTxt').innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 500,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    if (data.error) {
      typeText('Error: ' + data.error.message, document.getElementById('respTxt'));
      setOrb('idle');
      return;
    }
    const reply = data.content?.[0]?.text || 'Systems error.';
    history.push({ role: 'assistant', content: reply });
    const display = cleanText(reply);
    await typeText(display, document.getElementById('respTxt'));
    await speak(reply);
  } catch(e) {
    document.getElementById('respTxt').textContent = 'Connection error, Father. Check your network.';
    setOrb('idle');
  }
}

// ─── MIC ─────────────────────────────────────────────
function orbClick() {
  if (isListening) { stopMic(); return; }
  startMic();
}

function toggleMic() {
  if (isListening) { stopMic(); return; }
  startMic();
}

function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    typeText('Voice not supported in this browser, Father. Please use the text input.', document.getElementById('respTxt'));
    return;
  }
  rec = new SR();
  rec.lang = 'en-US';
  rec.continuous = false;
  rec.interimResults = false;
  rec.onstart = () => { isListening = true; document.getElementById('micBtn').classList.add('active'); setOrb('listening'); };
  rec.onresult = e => {
    const t = e.results[0][0].transcript;
    document.getElementById('userIn').value = t;
    stopMic();
    callJarvis(t);
  };
  rec.onerror = () => { stopMic(); setOrb('idle'); };
  rec.onend = () => { isListening = false; document.getElementById('micBtn').classList.remove('active'); };
  rec.start();
}

function stopMic() {
  if (rec) { try { rec.stop(); } catch(e) {} rec = null; }
  isListening = false;
  document.getElementById('micBtn').classList.remove('active');
}

// ─── SEND ─────────────────────────────────────────────
function send() {
  const v = document.getElementById('userIn').value.trim();
  if (!v) return;
  document.getElementById('userIn').value = '';
  callJarvis(v);
}

// ─── API KEY ──────────────────────────────────────────
function saveApiKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (!val || val.length < 20) {
    document.getElementById('apiKeyInput').placeholder = 'Paste your full API key here...';
    return;
  }
  apiKey = val;
  try { localStorage.setItem('jarvis_api_key', apiKey); } catch(e) {}
  document.getElementById('setupBox').classList.add('hidden');
  
  const greeting = 'All systems online. Welcome back, Father. I am ready to serve.';
  typeText(greeting, document.getElementById('respTxt'));
  
  // Small delay to ensure DOM is ready before speaking on iOS
  setTimeout(() => speak(greeting), 500);
}

function loadApiKey() {
  try { apiKey = localStorage.getItem('jarvis_api_key') || ''; } catch(e) { apiKey = ''; }
  if (apiKey) {
    document.getElementById('setupBox').classList.add('hidden');
    setTimeout(() => {
      typeText('All systems online. Welcome back, Father.', document.getElementById('respTxt'));
    }, 600);
  }
}

// ─── CLAP DETECTION ───────────────────────────────────
let clapLastTime = 0;
let clapCount = 0;
let clapTimer = null;

async function startClapDetection() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const src = ctx.createMediaStreamSource(stream);
    const analyser = ctx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    let lastVolume = 0;
    let clapCooldown = false;

    function detect() {
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a,b) => a+b, 0) / data.length;
      const now = Date.now();
      
      // Detect a sudden spike in volume (clap = sharp loud sound)
      const spike = avg - lastVolume;
      lastVolume = avg;
      
      if (spike > 20 && avg > 40 && !clapCooldown && !isListening) {
        clapCooldown = true;
        clapLastTime = now;
        clapCount++;
        clearTimeout(clapTimer);
        
        clapTimer = setTimeout(() => {
          if (clapCount >= 2) {
            clapCount = 0;
            onClap();
          } else {
            clapCount = 0;
          }
        }, 1000);
        
        // Reset cooldown after 200ms to allow next clap
        setTimeout(() => { clapCooldown = false; }, 200);
      }
      requestAnimationFrame(detect);
    }
    detect();
  } catch(e) {
    console.log('Clap detection unavailable:', e);
  }
}

async function onClap() {
  initSong();
  
  // Play song at lower volume so speech can be heard over it
  songAudio.currentTime = 0;
  songAudio.volume = 0.25;
  songAudio.play().catch(() => {});
  songPlaying = true;
  document.getElementById('musicBtn').classList.add('playing');
  document.getElementById('musicBtn').innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="3" width="3" height="10" rx="1" fill="currentColor"/><rect x="10" y="3" width="3" height="10" rx="1" fill="currentColor"/></svg> STOP SONG';

  // Speak motivational greeting WITH song in background
  const greeting = 'Good morning, Father. The empire awaits your command. Let us make today extraordinary.';
  typeText(greeting, document.getElementById('respTxt'));
  await speak(greeting);

  // Then give full briefing while song still plays softly
  await callJarvis('Give me a sharp motivational morning briefing in under 80 words. No bullet points. Speak naturally like a butler.');

  // Stop song after briefing
  setTimeout(() => {
    if (songAudio) {
      songAudio.pause();
      songAudio.currentTime = 0;
    }
    songPlaying = false;
    document.getElementById('musicBtn').classList.remove('playing');
    document.getElementById('musicBtn').innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 12V4l7-2v8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="4" cy="12" r="2" stroke="currentColor" stroke-width="1.2"/><circle cx="11" cy="10" r="2" stroke="currentColor" stroke-width="1.2"/></svg> PLAY SONG';
  }, 30000);
}

// ─── INIT ─────────────────────────────────────────────
loadApiKey();
setTimeout(() => startClapDetection(), 2000);
</script>
